<!DOCTYPE html>
<html>
<head>
<title>AI Life Hub</title>
<style>
body{

}
header{
background:#00bcd4;
padding:20px;
font-size:30px;

}

margin:20px;

}

<body>

<header>AI Life Hub</header>

<div class="card">
<h2>Smart Planner</h2>
<p>Organize your day instantly.</p>
<button onclick="alert('Planner Opened')">Open</button>
</div>

<div class="card">
<h2>AI Writing Helper</h2>
<p>Create essays, notes, and emails.</p>
<button onclick="alert('Writing Tool Opened')">Open</button>
</div>

<div class="card">
<h2>Mood Tracker</h2>
<p>Track emotions and stay motivated.</p>
<button onclick="alert('Mood Tracker Opened')">Open</button>
</div>

</html>
